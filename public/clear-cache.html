<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear Cache - Khatario</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1a202c;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      color: #4a5568;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .status {
      background: #f7fafc;
      border-left: 4px solid #4299e1;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    .status.success {
      border-left-color: #48bb78;
      background: #f0fff4;
    }
    .status.error {
      border-left-color: #f56565;
      background: #fff5f5;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
      margin-bottom: 10px;
    }
    button:hover {
      background: #5a67d8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
      transform: none;
    }
    .log {
      background: #2d3748;
      color: #e2e8f0;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log div {
      margin-bottom: 5px;
    }
    .success-icon {
      color: #48bb78;
      font-size: 48px;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clear Cache & Service Workers</h1>
    <p>This page will clear all cached data, service workers, and storage for Khatario to fix offline mode issues.</p>
    
    <div id="status" class="status">
      Ready to clear cache...
    </div>

    <button id="clearBtn" onclick="clearEverything()">🚀 Clear All Cache & Reload</button>
    <button onclick="window.location.href='/'">← Back to Home</button>

    <div class="log" id="log"></div>
  </div>

  <script>
    const log = [];
    
    function addLog(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      log.push(`[${timestamp}] ${message}`);
      document.getElementById('log').innerHTML = log.map(l => `<div>${l}</div>`).join('');
      document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
    }

    async function clearEverything() {
      const btn = document.getElementById('clearBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.textContent = '⏳ Clearing...';
      
      addLog('Starting cache clear process...');

      try {
        // 1. Unregister all service workers
        addLog('Unregistering service workers...');
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let registration of registrations) {
            await registration.unregister();
            addLog(`✓ Unregistered SW: ${registration.scope}`);
          }
          if (registrations.length === 0) {
            addLog('No service workers found');
          }
        }

        // 2. Clear all caches
        addLog('Clearing cache storage...');
        if ('caches' in window) {
          const cacheNames = await caches.keys();
          for (let cacheName of cacheNames) {
            await caches.delete(cacheName);
            addLog(`✓ Deleted cache: ${cacheName}`);
          }
          if (cacheNames.length === 0) {
            addLog('No caches found');
          }
        }

        // 3. Clear localStorage
        addLog('Clearing localStorage...');
        const lsKeys = Object.keys(localStorage);
        localStorage.clear();
        addLog(`✓ Cleared ${lsKeys.length} localStorage items`);

        // 4. Clear sessionStorage
        addLog('Clearing sessionStorage...');
        const ssKeys = Object.keys(sessionStorage);
        sessionStorage.clear();
        addLog(`✓ Cleared ${ssKeys.length} sessionStorage items`);

        // 5. Clear IndexedDB
        addLog('Clearing IndexedDB...');
        if ('indexedDB' in window) {
          const dbs = await indexedDB.databases();
          for (let db of dbs) {
            indexedDB.deleteDatabase(db.name);
            addLog(`✓ Deleted IndexedDB: ${db.name}`);
          }
          if (dbs.length === 0) {
            addLog('No IndexedDB databases found');
          }
        }

        // 6. Clear cookies
        addLog('Clearing cookies...');
        document.cookie.split(";").forEach(function(c) { 
          document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
        });
        addLog('✓ Cleared cookies');

        // Success!
        status.className = 'status success';
        status.innerHTML = '<div class="success-icon">✅</div><strong>Success!</strong> All cache cleared. Reloading in 3 seconds...';
        addLog('✅ ALL CACHE CLEARED SUCCESSFULLY!');
        addLog('Reloading page...');

        btn.textContent = '✅ Done! Reloading...';

        // Reload after 3 seconds
        setTimeout(() => {
          window.location.href = '/';
        }, 3000);

      } catch (error) {
        status.className = 'status error';
        status.innerHTML = `<strong>Error:</strong> ${error.message}`;
        addLog(`❌ Error: ${error.message}`);
        btn.disabled = false;
        btn.textContent = '🔄 Try Again';
      }
    }

    // Auto-clear on page load if ?auto=true
    if (window.location.search.includes('auto=true')) {
      addLog('Auto-clear triggered');
      setTimeout(() => clearEverything(), 500);
    }
  </script>
</body>
</html>
