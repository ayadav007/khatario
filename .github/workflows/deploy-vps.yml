# Auto-deploy to VPS when main is updated (after PR merge).
#
# Required GitHub repo secrets:
#   VPS_HOST      — e.g. 123.45.67.89 or app.khatario.com
#   VPS_USER      — e.g. deploy or root
#   VPS_SSH_KEY   — private key for SSH
#   VPS_APP_PATH  — e.g. /var/www/khatario
#
# Optional secrets:
#   VPS_SSH_PORT  — default 22

name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"
            git pull origin main
            chmod +x scripts/deploy-vps.sh
            ./scripts/deploy-vps.sh --no-pull
