<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <title>Khatario</title>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; background: #ffffff; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Loading spinner — shown while redirect is in flight */
      #spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      /* First-time offline message — hidden until redirect fails */
      #offline-msg {
        display: none;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 32px 24px;
        max-width: 320px;
      }
      .logo { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; color: #111827; margin-bottom: 24px; }
      .icon {
        width: 56px; height: 56px;
        background: #fef3c7;
        border: 1px solid #fde68a;
        border-radius: 16px;
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 20px;
      }
      .icon svg { width: 26px; height: 26px; stroke: #d97706; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      h1 { font-size: 20px; font-weight: 700; color: #111827; margin: 0 0 8px; }
      p  { font-size: 14px; color: #6b7280; line-height: 1.55; margin: 0; }
    </style>
  </head>
  <body>
    <div id="spinner"></div>
    <div id="offline-msg">
      <div class="logo">Khatario</div>
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M1 1l22 22"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
      <h1>No internet connection</h1>
      <p>Connect to the internet to get started with Khatario.</p>
    </div>
    <script src="offline.js"></script>
  </body>
</html>
