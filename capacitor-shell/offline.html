<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <title>Khatario — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-user-select: none;
        user-select: none;
      }
      .card {
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .logo {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 6px;
      }
      .tag {
        color: #94a3b8;
        margin-bottom: 28px;
        font-size: 14px;
      }
      .icon-wrap {
        width: 56px;
        height: 56px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: rgba(251, 191, 36, 0.12);
        border: 1px solid rgba(251, 191, 36, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-wrap svg {
        width: 28px;
        height: 28px;
        stroke: #fbbf24;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .subtitle {
        font-size: 14px;
        line-height: 1.55;
        color: #94a3b8;
        margin: 0 0 24px;
      }
      .hint {
        font-size: 13px;
        color: #64748b;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      button {
        appearance: none;
        width: 100%;
        padding: 14px 20px;
        border-radius: 12px;
        border: 0;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }
      button:active {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      .btn-primary {
        background: #38bdf8;
        color: #0f172a;
      }
      .btn-secondary {
        background: transparent;
        color: #e2e8f0;
        border: 1px solid rgba(148, 163, 184, 0.45);
      }
      .status {
        margin-top: 16px;
        font-size: 12px;
        color: #64748b;
        min-height: 18px;
        line-height: 1.45;
      }
      .checking .icon-wrap {
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
    </style>
  </head>
  <body>
    <div class="card" id="root">
      <div class="icon-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <div class="logo">Khatario</div>
      <div class="tag">Invoice &amp; Billing</div>
      <h1>No internet connection</h1>
      <p class="subtitle">
        If you signed in on this device before, we can open your cached store
        dashboard for offline billing.
      </p>
      <p class="hint">
        First-time install needs one online visit to download the app shell.
      </p>
      <div class="actions">
        <button type="button" id="bootstrap" class="btn-primary">
          Open Khatario (offline)
        </button>
        <button type="button" id="retry" class="btn-secondary">Try again</button>
      </div>
      <p class="status" id="status" aria-live="polite">Opening offline app…</p>
    </div>
    <script src="offline.js"></script>
  </body>
</html>
