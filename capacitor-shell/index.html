<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <title>Khatario</title>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-user-select: none;
        user-select: none;
      }
      .card {
        width: 100%;
        max-width: 380px;
        text-align: center;
      }
      .logo {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }
      .tag {
        color: #94a3b8;
        margin-bottom: 32px;
        font-size: 14px;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #38bdf8;
        animation: spin 0.9s linear infinite;
        margin: 0 auto 20px;
      }
      .hint {
        font-size: 13px;
        color: #64748b;
        line-height: 1.5;
      }
      button {
        appearance: none;
        margin-top: 20px;
        padding: 12px 20px;
        border-radius: 10px;
        border: 0;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }
      button:active { opacity: 0.85; }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner" aria-hidden="true"></div>
      <div class="logo">Khatario</div>
      <div class="tag">Connecting to your store…</div>
      <div class="hint">
        If this screen stays for more than a few seconds, check your
        internet connection and try again.
      </div>
      <button type="button" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
